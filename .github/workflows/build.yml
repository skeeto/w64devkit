name: Build and test

concurrency:
  group: w64devkit-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
  pull_request:
    branches: [ "master" ]

# Must set Settings -> Actions -> General -> Workflow permissions to
# "Read and write permissions"
permissions:
  contents: write
  id-token: write

jobs:
  build-x64:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name != github.repository
    env:
      ARCH: x64

    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Generate archive name and version string
        id: filename
        run: |
          GIT_VERSION="$(git describe --tags --always)"
          echo "version=${GIT_VERSION:1}" >> $GITHUB_OUTPUT
          echo "archive=w64devkit-$ARCH-${GIT_VERSION:1}" >> $GITHUB_OUTPUT

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          tags: w64devkit:${{ env.ARCH }}
          load: true
          cache-from: type=gha,scope=w64devkit-${{ env.ARCH }}
          cache-to: type=gha,scope=w64devkit-${{ env.ARCH }},mode=max

      - name: Build source image
        uses: docker/build-push-action@v7
        with:
          context: .
          target: source
          tags: w64devkit:source
          load: true
          cache-from: type=gha,scope=w64devkit-${{ env.ARCH }}

      - name: Extract artifact
        run: |
          docker run --rm w64devkit:${{ env.ARCH }} > w64devkit.exe
          mv w64devkit.exe ${{ steps.filename.outputs.archive }}.7z.exe
          ls -lh ${{ steps.filename.outputs.archive }}.7z.exe

      - name: Extract source tarball
        run: |
          docker run --rm w64devkit:source tar cf - \
            --sort=name --mtime='1970-01-01' --owner=0 --group=0 --numeric-owner \
            source/ > source.tar
          ls -lh source.tar

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: w64devkit-x64-unsigned
          path: ${{ steps.filename.outputs.archive }}.7z.exe

      - name: Upload source tarball
        uses: actions/upload-artifact@v7
        with:
          name: source-tarball
          path: source.tar

  build-x86:
    runs-on: ubuntu-latest
    needs: build-x64
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name != github.repository
    env:
      ARCH: x86

    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Apply x86 patch
        run: patch -p1 -i src/variant-x86.patch

      - name: Generate archive name and version string
        id: filename
        run: |
          GIT_VERSION="$(git describe --tags --always)"
          echo "version=${GIT_VERSION:1}" >> $GITHUB_OUTPUT
          echo "archive=w64devkit-$ARCH-${GIT_VERSION:1}" >> $GITHUB_OUTPUT

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          tags: w64devkit:${{ env.ARCH }}
          load: true
          cache-from: type=gha,scope=w64devkit-${{ env.ARCH }}
          cache-to: type=gha,scope=w64devkit-${{ env.ARCH }},mode=max

      - name: Extract artifact
        run: |
          docker run --rm w64devkit:${{ env.ARCH }} > w64devkit.exe
          mv w64devkit.exe ${{ steps.filename.outputs.archive }}.7z.exe
          ls -lh ${{ steps.filename.outputs.archive }}.7z.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: w64devkit-x86-unsigned
          path: ${{ steps.filename.outputs.archive }}.7z.exe

  sign:
    needs: [build-x64, build-x86]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: windows-latest
    environment: release

    steps:
      - name: Download x64 executable
        uses: actions/download-artifact@v8
        with:
          name: w64devkit-x64-unsigned

      - name: Download x86 executable
        uses: actions/download-artifact@v8
        with:
          name: w64devkit-x86-unsigned

      - name: Azure login
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          allow-no-subscriptions: true

      - name: Sign executables
        uses: azure/artifact-signing-action@v1.2.0
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          endpoint: ${{ secrets.TRUSTED_SIGNING_ENDPOINT }}
          signing-account-name: ${{ secrets.TRUSTED_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ secrets.CERTIFICATE_PROFILE }}
          files-folder: ${{ github.workspace }}
          files-folder-filter: exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Upload signed x64
        uses: actions/upload-artifact@v7
        with:
          name: w64devkit-x64-signed
          path: w64devkit-x64-*.7z.exe

      - name: Upload signed x86
        uses: actions/upload-artifact@v7
        with:
          name: w64devkit-x86-signed
          path: w64devkit-x86-*.7z.exe

  release:
    needs: sign
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest

    steps:
      - name: Download signed x64
        uses: actions/download-artifact@v8
        with:
          name: w64devkit-x64-signed

      - name: Download signed x86
        uses: actions/download-artifact@v8
        with:
          name: w64devkit-x86-signed

      - name: Download source tarball
        uses: actions/download-artifact@v8
        with:
          name: source-tarball

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          DRAFT_FLAG=""
          if ! [[ "$GITHUB_REF_NAME" == v* ]]; then
            DRAFT_FLAG="--draft"
          fi
          gh release create "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$VERSION" \
            $DRAFT_FLAG \
            w64devkit-*.7z.exe \
            source.tar
