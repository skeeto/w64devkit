name: Build and test

concurrency:
  group: w64devkit-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
  pull_request:
    branches: [ "master" ]

# Must set Settings -> Actions -> General -> Workflow permissions to
# "Read and write permissions"
permissions:
  contents: write
  id-token: write

jobs:
  build-x64:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name != github.repository
    env:
      ARCH: x64

    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Generate archive name and version string
        id: filename
        run: |
          GIT_VERSION="$(git describe --tags --always)"
          echo "version=${GIT_VERSION:1}" >> $GITHUB_OUTPUT
          echo "archive=w64devkit-$ARCH-${GIT_VERSION:1}" >> $GITHUB_OUTPUT

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          tags: w64devkit:${{ env.ARCH }}
          load: true
          cache-from: type=gha,scope=w64devkit-${{ env.ARCH }}
          cache-to: type=gha,scope=w64devkit-${{ env.ARCH }},mode=max

      - name: Build source image
        uses: docker/build-push-action@v7
        with:
          context: .
          target: source
          tags: w64devkit:source
          load: true
          cache-from: type=gha,scope=w64devkit-${{ env.ARCH }}

      - name: Extract artifact
        run: |
          docker run --rm w64devkit:${{ env.ARCH }} > w64devkit.exe
          mv w64devkit.exe ${{ steps.filename.outputs.archive }}.7z.exe
          ls -lh ${{ steps.filename.outputs.archive }}.7z.exe

      - name: Extract source tarball
        run: |
          docker run --rm w64devkit:source tar cf - \
            --sort=name --mtime='1970-01-01' --owner=0 --group=0 --numeric-owner \
            source/ > source.tar
          ls -lh source.tar

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.filename.outputs.archive }}.7z.exe
          path: ${{ steps.filename.outputs.archive }}.7z.exe
          archive: false

      - name: Upload source tarball
        uses: actions/upload-artifact@v7
        with:
          name: source.tar
          path: source.tar
          archive: false

  build-x86:
    runs-on: ubuntu-latest
    needs: build-x64
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name != github.repository
    env:
      ARCH: x86

    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Apply x86 patch
        run: patch -p1 -i src/variant-x86.patch

      - name: Generate archive name and version string
        id: filename
        run: |
          GIT_VERSION="$(git describe --tags --always)"
          echo "version=${GIT_VERSION:1}" >> $GITHUB_OUTPUT
          echo "archive=w64devkit-$ARCH-${GIT_VERSION:1}" >> $GITHUB_OUTPUT

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          tags: w64devkit:${{ env.ARCH }}
          load: true
          cache-from: type=gha,scope=w64devkit-${{ env.ARCH }}
          cache-to: type=gha,scope=w64devkit-${{ env.ARCH }},mode=max

      - name: Extract artifact
        run: |
          docker run --rm w64devkit:${{ env.ARCH }} > w64devkit.exe
          mv w64devkit.exe ${{ steps.filename.outputs.archive }}.7z.exe
          ls -lh ${{ steps.filename.outputs.archive }}.7z.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.filename.outputs.archive }}.7z.exe
          path: ${{ steps.filename.outputs.archive }}.7z.exe
          archive: false

  release:
    needs: [build-x64, build-x86]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    environment: release

    steps:
      - name: Compute filenames
        id: names
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          echo "x64=w64devkit-x64-$VERSION.7z.exe" >> "$GITHUB_OUTPUT"
          echo "x86=w64devkit-x86-$VERSION.7z.exe" >> "$GITHUB_OUTPUT"

      - name: Download x64 executable
        uses: actions/download-artifact@v8
        with:
          name: ${{ steps.names.outputs.x64 }}

      - name: Download x86 executable
        uses: actions/download-artifact@v8
        with:
          name: ${{ steps.names.outputs.x86 }}

      - name: Download source tarball
        uses: actions/download-artifact@v8
        with:
          name: source.tar

      - name: Sign executables
        uses: skeeto/aas-sign@v1.0.0
        with:
          endpoint:  ${{ secrets.TRUSTED_SIGNING_ENDPOINT }}
          account:   ${{ secrets.TRUSTED_SIGNING_ACCOUNT }}
          profile:   ${{ secrets.CERTIFICATE_PROFILE }}
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          files: |
            ${{ steps.names.outputs.x64 }}
            ${{ steps.names.outputs.x86 }}

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          # Tags like vX.Y.Z-rcN are pipeline-test runs: publish as a
          # draft prerelease so they don't trigger release immutability
          # and can be deleted/retried freely.
          FLAGS=()
          if [[ "$VERSION" == *-rc* ]]; then
            FLAGS+=(--draft --prerelease)
          fi
          gh release create "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$VERSION" \
            "${FLAGS[@]}" \
            w64devkit-*.7z.exe \
            source.tar
